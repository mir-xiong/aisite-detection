version: '3.8'

services:
  ai-site-detection:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ai-site-detection
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/detect', (r) => {process.exit(r.statusCode === 405 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - ai-detection-network

networks:
  ai-detection-network:
    driver: bridge
